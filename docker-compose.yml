version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: one-era-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-one_era}
      MYSQL_USER: ${DB_USER:-one_era_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-one_era_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
